spring.datasource.url=jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT}/${DATABASE_NAME}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.show-sql=false

cache.jobs.ttl-minutes=5
cache.companies.ttl-minutes=5

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173,https://jobportal.nicko.com

spring.docker.compose.enabled=false
management.tracing.sampling.probability=0.0
management.tracing.export.enabled=false
management.otlp.metrics.export.enabled=false
management.logging.export.otlp.enabled=false